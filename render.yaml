services:
  - type: web                         # FREE tier — web service, not background worker
    name: admin-support
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    healthCheckPath: /health          # Render uses this to confirm the service is up
    envVars:
      - key: BOT_TOKEN
        sync: false                   # Set manually in Render dashboard (secret)
      - key: ADMIN_GROUP_ID
        sync: false                   # Set manually in Render dashboard (secret)
      - key: MONGO_URI
        sync: false                   # Set manually in Render dashboard (secret)
      - key: WEBHOOK_HOST
        sync: false                   # Set to your Render URL after first deploy
      - key: DB_NAME
        value: supportbot
      - key: RATE_LIMIT_MESSAGES
        value: "5"
      - key: RATE_LIMIT_WINDOW
        value: "60"
      - key: RATE_LIMIT_COOLDOWN
        value: "300"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # PORT is injected automatically by Render — do not set it here
